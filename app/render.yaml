services:
  - type: web
    name: job-tracker-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
```

**2. Make sure your `.gitignore` has `.env`** — you don't want your real credentials pushed to GitHub.

**3. Push the latest backend to GitHub:**
```
git add .
git commit -m "Add render config"
git push